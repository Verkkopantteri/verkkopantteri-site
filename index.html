<script>
  var VP_BUBBLE_T = {
    fi: { text: 'Teetkö vielä asioita käsin, joita voisit automatisoida?', cta: 'Selvitä →' },
    en: { text: 'Still doing things manually that could be automated?', cta: 'Find out →' }
  };

  function vpUpdateBubbleLang(lang) {
    var t = VP_BUBBLE_T[lang] || VP_BUBBLE_T['fi'];
    var el = document.getElementById('vp-bubble-text');
    var cta = document.getElementById('vp-bubble-cta');
    if (el) el.textContent = t.text;
    if (cta) cta.textContent = t.cta;
  }

  document.addEventListener('DOMContentLoaded', function() {
    var lang = localStorage.getItem('vp_lang') || 'fi';
    vpUpdateBubbleLang(lang);
  });

  function vpDismiss() {
    sessionStorage.setItem('vp_auto_dismissed', '1');
    var el = document.getElementById('vp-wrap');
    el.style.transition = 'transform 0.35s cubic-bezier(0.4,0,1,1)';
    el.classList.remove('visible');
  }

  function vpHide() { vpDismiss(); }

  document.addEventListener('DOMContentLoaded', function() {
    var bubbleText = document.getElementById('vp-bubble-text');
    var bubbleCta = document.getElementById('vp-bubble-cta');
    var bubbleAvatar = document.getElementById('vp-bubble-avatar');
    if(bubbleText) bubbleText.addEventListener('click', function() { sessionStorage.setItem('vp_auto_dismissed', '1'); });
    if(bubbleCta) bubbleCta.addEventListener('click', function() { sessionStorage.setItem('vp_auto_dismissed', '1'); });
    if(bubbleAvatar) bubbleAvatar.addEventListener('click', function() { sessionStorage.setItem('vp_auto_dismissed', '1'); });

    if (!sessionStorage.getItem('vp_auto_dismissed')) {
      setTimeout(function() {
        var wrap = document.getElementById('vp-wrap');
        if(wrap) wrap.classList.add('visible');
      }, 8000);
    }
  });
</script>
